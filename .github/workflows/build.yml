name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: gref-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: gref-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: gref-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: gref-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: gref-windows-amd64
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            artifact: gref-windows-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Check release version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          if [ "$cargo_version" != "$version" ]; then
            echo "tag version ($version) does not match Cargo.toml version ($cargo_version)" >&2
            exit 1
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          package="${{ matrix.artifact }}"
          mkdir -p "staging/$package/bin" "staging/$package/vim/plugin" "staging/$package/vim/autoload"
          cp "target/${{ matrix.target }}/release/gref" "staging/$package/bin/"
          cp contrib/vim/plugin/gref.vim "staging/$package/vim/plugin/"
          cp contrib/vim/autoload/gref.vim "staging/$package/vim/autoload/"
          cp install.sh install.ps1 README.md LICENSE "staging/$package/"
          chmod +x "staging/$package/bin/gref" "staging/$package/install.sh"
          tar czf "${{ matrix.artifact }}.tar.gz" -C staging "$package"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = "${{ matrix.artifact }}"
          New-Item -ItemType Directory -Path "staging/$package/bin" -Force
          New-Item -ItemType Directory -Path "staging/$package/vim/plugin" -Force
          New-Item -ItemType Directory -Path "staging/$package/vim/autoload" -Force
          Copy-Item "target/${{ matrix.target }}/release/gref.exe" -Destination "staging/$package/bin/"
          Copy-Item "contrib/vim/plugin/gref.vim" -Destination "staging/$package/vim/plugin/"
          Copy-Item "contrib/vim/autoload/gref.vim" -Destination "staging/$package/vim/autoload/"
          Copy-Item "install.sh", "install.ps1", "README.md", "LICENSE" -Destination "staging/$package/"
          Compress-Archive -Path "staging/$package" -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
